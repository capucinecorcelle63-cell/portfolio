<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capucine's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        :root {
            --accent: #f3d44d;
            --bg: #000000;
            --text: #ffffff;
            --mono: 'Space Mono', monospace;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            display: flex; justify-content: space-between;
            padding: 30px; position: fixed;
            width: 100%; box-sizing: border-box;
            z-index: 1000; background: linear-gradient(to bottom, black, transparent);
        }

        .brand { font-weight: bold; font-size: 0.9rem; }
        nav a, .admin-trigger {
            color: white; text-decoration: none;
            margin-left: 20px; font-size: 0.8rem;
            cursor: pointer; background: none; border: none; font-family: var(--mono);
        }
        nav a:hover, .admin-trigger:hover { color: var(--accent); }

        /* HERO & KEYCHAIN */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .eyebrow { color: var(--accent); font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 10px; }
        h1 { font-size: 2.5rem; font-weight: normal; margin-bottom: 40px; }

        .keychain-container {
            position: relative; width: 300px; height: 350px;
            display: flex; justify-content: center;
        }

        .key {
            position: absolute; top: 60px; left: 50%;
            transform-origin: top center;
            background: #111; border: 1px solid #333;
            color: white; padding: 12px 20px;
            border-radius: 5px; cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap; font-size: 0.7rem;
            text-decoration: none;
        }

        .key1 { transform: translateX(-50%) rotate(-10deg); z-index: 5; }
        .key2 { transform: translateX(-50%) rotate(-5deg); z-index: 4; }
        .key3 { transform: translateX(-50%) rotate(0deg); z-index: 3; }
        .key4 { transform: translateX(-50%) rotate(5deg); z-index: 2; }
        .key5 { transform: translateX(-50%) rotate(10deg); z-index: 1; }

        .keychain-container:hover .key1 { transform: translateX(-140%) rotate(-25deg); }
        .keychain-container:hover .key2 { transform: translateX(-80%) rotate(-12deg); }
        .keychain-container:hover .key3 { transform: translateX(-50%) translateY(20px); }
        .keychain-container:hover .key4 { transform: translateX(-20%) rotate(12deg); }
        .keychain-container:hover .key5 { transform: translateX(40%) rotate(25deg); }

        .key:hover { background: var(--accent) !important; color: black !important; z-index: 100 !important; }
    </style>
</head>
<body>

    <header>
        <div class="brand">WELCOME TO CAPUCINE'S PORTFOLIO</div>
        <nav>
            <a href="#about">ABOUT</a>
            <a href="mailto:hello@capucine.com">CONTACT</a>
            <a href="/admin/" class="admin-trigger">SETTINGS</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <p class="eyebrow">CREATIVE PORTFOLIO</p>
            <h1>capucine's portfolio</h1>
            
            <div class="keychain-container">
                <div class="keychain-ring"></div>
                <a href="product.html" class="key key1">PRODUCT DESIGN</a>
                <a href="graphic.html" class="key key2">GRAPHIC DESIGN</a>
                <a href="industrial.html" class="key key3">INDUSTRIAL DESIGN</a>
                <a href="craft.html" class="key key4">CRAFT & DESIGN</a>
                <a href="#about" class="key key5">ABOUT ME</a>
            </div>
        </section>

        <section id="about" style="padding: 100px 50px; border-top: 1px solid #111;">
            <h2 style="color: var(--accent); border-left: 3px solid var(--accent); padding-left: 15px;">ABOUT</h2>
            <p>Product Designer graduate...</p>
        </section>
    </main>

    <script>
        // Ce petit script permet de rediriger l'utilisateur après sa connexion via Netlify Identity
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>

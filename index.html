<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capucine's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <div class="brand">WELCOME TO CAPUCINE'S PORTFOLIO</div>
        <nav>
            <a href="#about">ABOUT</a>
            <a href="mailto:hello@capucine.com">CONTACT</a>
            <button class="admin-trigger">SETTINGS</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <p class="eyebrow">CREATIVE PORTFOLIO</p>
            <h1>capucine's portfolio</h1>
            
            <div class="keychain-container">
                <img src="assets/support.png" class="keychain-support" alt="Support">

                <div class="key-tag key1" onclick="handleKeyClick(this, 'product')">
                    <img src="assets/key1.png" alt="Product Design">
                </div>
                <div class="key-tag key2" onclick="handleKeyClick(this, 'graphic')">
                    <img src="assets/key2.png" alt="Graphic Design">
                </div>
                <div class="key-tag key3" onclick="handleKeyClick(this, 'industrial')">
                    <img src="assets/key3.png" alt="Industrial Design">
                </div>
                <div class="key-tag key4" onclick="handleKeyClick(this, 'craft')">
                    <img src="assets/key4.png" alt="Craft & Design">
                </div>
                <div class="key-tag key5" onclick="handleKeyClick(this, 'about')">
                    <img src="assets/key5.png" alt="About Me">
                </div>
            </div>
        </section>

        <section id="product" class="content-sec"><h2>PRODUCT DESIGN</h2><div class="grid" id="productGrid"></div></section>
        <section id="graphic" class="content-sec"><h2>GRAPHIC DESIGN</h2><div class="grid" id="graphicGrid"></div></section>
        <section id="industrial" class="content-sec"><h2>INDUSTRIAL DESIGN</h2><div class="grid" id="industrialGrid"></div></section>
        <section id="craft" class="content-sec"><h2>CRAFT & DESIGN</h2><div class="grid" id="craftGrid"></div></section>
        <section id="about" class="content-sec">
            <h2>ABOUT</h2>
            <p>Product Designer graduate with a strong sensitivity to materials and a strategic approach to projects...</p>
        </section>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>

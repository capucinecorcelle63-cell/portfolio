<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproduction Wildy Riftian</title>
    
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.5/dist/lenis.css">
    
    <style>
        :root {
            --bg-color: #f5f5f5;
            --text-color: #212121;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Container de la grille */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 colonnes comme sur le site */
            gap: 20px;
            padding: 40px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Style de chaque item (projet) */
        .project-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            aspect-ratio: 4 / 3;
            background: #e0e0e0;
            cursor: pointer;
        }

        .project-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Effet de zoom au survol */
        .project-item:hover img {
            transform: scale(1.05);
        }

        /* Overlay texte qui apparaît au hover */
        .project-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.4));
            color: white;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .project-item:hover .project-info {
            opacity: 1;
        }

        /* Pour créer du scroll */
        .spacer {
            height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="spacer">SCROLL DOWN</div>

    <main class="grid-container">
        <div class="project-item">
            <img src="https://picsum.photos/800/600?random=1" alt="Project">
            <div class="project-info">Projet 01</div>
        </div>
        <div class="project-item" style="margin-top: 50px;"> <img src="https://picsum.photos/800/600?random=2" alt="Project">
            <div class="project-info">Projet 02</div>
        </div>
        <div class="project-item">
            <img src="https://picsum.photos/800/600?random=3" alt="Project">
            <div class="project-info">Projet 03</div>
        </div>
        <div class="project-item" style="margin-top: 50px;">
            <img src="https://picsum.photos/800/600?random=4" alt="Project">
            <div class="project-info">Projet 04</div>
        </div>
    </main>

    <div class="spacer">FOOTER AREA</div>

    <script src="https://unpkg.com/lenis@1.1.5/dist/lenis.min.js"></script>
    <script>
        // Initialisation de Lenis (le moteur de mouvement du site Wildy)
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), // Effet d'inertie
            smoothWheel: true
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }

        requestAnimationFrame(raf);

        // Optionnel : Petit effet de parallaxe simple sur les images au scroll
        lenis.on('scroll', () => {
            const items = document.querySelectorAll('.project-item img');
            items.forEach(img => {
                const speed = 0.05;
                const rect = img.getBoundingClientRect();
                const scrollPos = window.innerHeight / 2 - rect.top;
                img.style.transform = `scale(1.1) translateY(${scrollPos * speed}px)`;
            });
        });
    </script>
</body>
</html>

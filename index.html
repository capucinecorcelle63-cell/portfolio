<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capucine Corcelle — Archive</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="site-header">
        <div class="brand">CAPUCINE CORCELLE — ARCHIVE</div>
        <nav>
            <a href="#home">ACCUEIL</a>
            <a href="#about">À PROPOS</a>
            <a href="#admin">ADMIN</a>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-text">
                <p class="eyebrow">DOSSIER / KEYCHAIN INDEX</p>
                <h1>Un portfolio pensé comme une archive vivante.</h1>
            </div>
            
            <div class="keychain-wrapper">
                <img src="https://capucinecorcelle63-cell.github.io/images/keychain.png" alt="Keychain" class="main-keychain">
                <div class="interactive-nav">
                    <button onclick="scrollToSection('product-design')">PRODUCT DESIGN</button>
                    <button onclick="scrollToSection('graphic-design')">GRAPHIC DESIGN</button>
                    <button onclick="scrollToSection('industrial-design')">INDUSTRIAL DESIGN</button>
                    <button onclick="scrollToSection('about')">ABOUT ME</button>
                </div>
            </div>
        </section>

        <section id="product-design" class="content-sec">
            <h2>PRODUCT DESIGN</h2>
            <div id="productPreview" class="grid"></div>
        </section>

        <section id="about" class="content-sec">
            <h2>ABOUT</h2>
            <p>Designer pluridisciplinaire passionnée par les systèmes d'archives.</p>
        </section>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>

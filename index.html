<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Porte-Clés</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000 !important; color: white; font-family: sans-serif; overflow-x: hidden; }
        .keychain-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; z-index: 100; pointer-events: none; }
        .keychain-wrapper { position: relative; width: 600px; height: 600px; pointer-events: auto; }
        .key-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 50% 21%; transition: transform 0.6s ease-out; pointer-events: none; }
        .hitbox { position: absolute; top: 25%; left: 35%; width: 30%; height: 50%; pointer-events: auto; cursor: pointer; z-index: 10; }
        .visual { width: 100%; height: 100%; transition: all 0.5s ease; filter: brightness(0.5); }
        .visual img { width: 100%; height: 100%; object-fit: contain; }
        .key-layer.is-active .visual { filter: brightness(1); transform: translateY(20px) scale(1.1); }
        .support-layer { z-index: 5; }
        .content-scroll { position: relative; padding-top: 120vh; z-index: 1; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; padding: 100px 50px; max-width: 1000px; margin: 0 auto; }
        .project-box { background: #111; aspect-ratio: 16/9; border-radius: 10px; }
        nav { position: fixed; top: 20px; width: 100%; text-align: center; z-index: 1000; display: flex; justify-content: center; gap: 30px; }
        nav a { color: white; text-decoration: none; font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <nav>
        <a href="#">PROJETS</a>
        <a href="#">INFOS</a>
        <a href="#">CONTACT</a>
    </nav>

    <div class="keychain-container">
        <div class="keychain-wrapper" id="keychain">
            <div class="key-layer support-layer">
                <div class="visual">
                    <img src="https://raw.githubusercontent.com/Arshakir/Porte-cles/main/anneau.png" alt="Anneau">
                </div>
            </div>
            </div>
    </div>

    <div class="content-scroll">
        <div class="grid-container" id="grid"></div>
    </div>

    <script src="https://unpkg.com/lenis@1.1.5/dist/lenis.min.js"></script>
    <script src="app.js"></script>
</body>
</html>

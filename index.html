<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capucine's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #f3d44d;
            --bg: #000000;
            --text: #ffffff;
            --mono: 'Space Mono', monospace;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            display: flex; justify-content: space-between;
            padding: 30px; position: fixed;
            width: 100%; box-sizing: border-box;
            z-index: 1000;
        }

        .brand { font-weight: bold; font-size: 0.9rem; }
        nav a, .admin-trigger {
            color: white; text-decoration: none;
            margin-left: 20px; font-size: 0.8rem;
            cursor: pointer; background: none; border: none; font-family: var(--mono);
        }
        nav a:hover, .admin-trigger:hover { color: var(--accent); }

        /* HERO */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .eyebrow { color: var(--accent); font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 10px; }
        h1 { font-size: 2.5rem; font-weight: normal; margin-bottom: 60px; }

        /* KEYCHAIN REALISTIC SYSTEM */
        .keychain-container {
            position: relative; 
            width: 500px; /* Plus large pour l'aisance */
            height: 450px;
            display: flex; 
            justify-content: center;
        }

        .support-img {
            position: absolute; 
            top: 0; 
            width: 180px; /* Support plus grand et visible */
            z-index: 50;
            pointer-events: none;
        }

        .key-tag {
            position: absolute; 
            top: 40px; /* Ajusté pour que le trou du tag soit sur l'anneau du support */
            left: 50%;
            width: 160px; /* Tags plus grands pour la lisibilité */
            /* Pivot crucial : situé en haut au centre de l'image (là où est le trou) */
            transform-origin: center 20px; 
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            background: none;
            border: none;
            padding: 0;
            outline: none;
        }

        .key-tag img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        /* POSITIONS DE REPOS (Trousseau naturel) */
        .tag1 { transform: translateX(-50%) rotate(-12deg); z-index: 5; }
        .tag2 { transform: translateX(-50%) rotate(-6deg); z-index: 4; }
        .tag3 { transform: translateX(-50%) rotate(0deg); z-index: 3; }
        .tag4 { transform: translateX(-50%) rotate(6deg); z-index: 2; }
        .tag5 { transform: translateX(-50%) rotate(12deg); z-index: 1; }

        /* EFFET ÉVENTAIL RÉALISTE AU SURVOL */
        /* On utilise principalement la rotation pour qu'ils pivotent autour de l'anneau */
        .keychain-container:hover .tag1 { transform: translateX(-110%) rotate(-45deg); }
        .keychain-container:hover .tag2 { transform: translateX(-80%) rotate(-25deg); }
        .keychain-container:hover .tag3 { transform: translateX(-50%) translateY(15px); }
        .keychain-container:hover .tag4 { transform: translateX(-20%) rotate(25deg); }
        .keychain-container:hover .tag5 { transform: translateX(10%) rotate(45deg); }

        /* MISE EN AVANT DU TAG SURVOLÉ */
        .key-tag:hover { 
            z-index: 100 !important; 
            scale: 1.1;
            filter: brightness(1.1);
        }

        /* SECTIONS */
        section.content { padding: 100px 50px; border-top: 1px solid #111; min-height: 100vh; }
        h2 { color: var(--accent); border-left: 3px solid var(--accent); padding-left: 15px; }
        
        /* ADMIN PANEL */
        #adminPanel {
            display: none; position: fixed; top: 0; right: 0;
            width: 350px; height: 100%; background: #111;
            border-left: 2px solid var(--accent); z-index: 2000;
            padding: 40px; box-sizing: border-box;
        }
        .admin-open { display: block !important; }
        input, textarea {
            width: 100%; background: #000; border: 1px solid #333;
            color: white; padding: 10px; margin: 10px 0; font-family: var(--mono);
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">WELCOME TO CAPUCINE'S PORTFOLIO</div>
        <nav>
            <a href="#about">ABOUT</a>
            <a href="mailto:hello@capucine.com">CONTACT</a>
            <button class="admin-trigger" onclick="openAdmin()">SETTINGS</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <p class="eyebrow">CREATIVE PORTFOLIO</p>
            <h1>capucine's portfolio</h1>
            
            <div class="keychain-container">
                <img src="assets/support.png" class="support-img" alt="Ring Support">
                
                <button class="key-tag tag1" onclick="scrollToSec('product')">
                    <img src="assets/key1.png" alt="Product Design">
                </button>
                <button class="key-tag tag2" onclick="scrollToSec('graphic')">
                    <img src="assets/key2.png" alt="Graphic Design">
                </button>
                <button class="key-tag tag3" onclick="scrollToSec('industrial')">
                    <img src="assets/key3.png" alt="Industrial Design">
                </button>
                <button class="key-tag tag4" onclick="scrollToSec('craft')">
                    <img src="assets/key4.png" alt="Craft & Design">
                </button>
                <button class="key-tag tag5" onclick="scrollToSec('about')">
                    <img src="assets/key5.png" alt="About Me">
                </button>
            </div>
        </section>

        <section id="product" class="content"><h2>PRODUCT DESIGN</h2></section>
        <section id="graphic" class="content"><h2>GRAPHIC DESIGN</h2></section>
        <section id="industrial" class="content"><h2>INDUSTRIAL DESIGN</h2></section>
        <section id="craft" class="content"><h2>CRAFT & DESIGN</h2></section>
        <section id="about" class="content"><h2>ABOUT</h2><p>Designer based in Lyon.</p></section>
    </main>

    <div id="adminPanel">
        <h3 style="color: var(--accent);">SETTINGS</h3>
        <input type="password" id="adminPass" placeholder="Password">
        <button onclick="checkAdmin()" style="width: 100%; padding: 10px; background: var(--accent); border: none; cursor: pointer;">UNLOCK</button>
        <div id="adminTools" style="display:none; margin-top: 30px;">
            <input type="text" placeholder="Project Title">
            <textarea placeholder="Description"></textarea>
            <button style="background: white; color: black; border: none; padding: 5px 10px;">PUBLISH</button>
        </div>
        <br><br>
        <button onclick="closeAdmin()" style="color: grey; background: none; border: none; cursor: pointer;">CLOSE</button>
    </div>

    <script>
        function scrollToSec(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }
        function openAdmin() { document.getElementById('adminPanel').classList.add('admin-open'); }
        function closeAdmin() { document.getElementById('adminPanel').classList.remove('admin-open'); }
        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "NUGGETS4LIFE") {
                document.getElementById('adminTools').style.display = 'block';
                alert("Access Granted.");
            } else { alert("Wrong password."); }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capucine's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #f3d44d;
            --bg: #000000;
            --text: #ffffff;
            --mono: 'Space Mono', monospace;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        header {
            display: flex; justify-content: space-between;
            padding: 30px; position: fixed;
            width: 100%; box-sizing: border-box;
            z-index: 1000;
        }

        .brand { font-weight: bold; font-size: 0.8rem; letter-spacing: 1px; }
        nav a, .admin-trigger {
            color: white; text-decoration: none;
            margin-left: 20px; font-size: 0.8rem;
            cursor: pointer; background: none; border: none; font-family: var(--mono);
        }

        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .eyebrow { color: var(--accent); font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 10px; }
        h1 { font-size: 2.5rem; font-weight: normal; margin-bottom: 20px; text-transform: lowercase; }

        /* KEYCHAIN DYNAMIC SYSTEM - PATHS UPDATED TO ASSETS/ */
        .keychain-wrapper {
            position: relative;
            width: 600px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin-top: -20px;
        }

        .support-img {
            position: absolute;
            top: 0;
            width: 160px;
            z-index: 50;
            pointer-events: none;
        }

        .tag-btn {
            position: absolute;
            top: 65px; 
            left: 50%;
            width: 130px; 
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            transform-origin: center 25px; 
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            outline: none;
        }

        .tag-btn img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
        }

        /* REPOS - VERY COMPACT */
        .tag-btn[data-id="key1"] { transform: translateX(-50%) rotate(-20deg); z-index: 5; }
        .tag-btn[data-id="key2"] { transform: translateX(-50%) rotate(-10deg); z-index: 4; }
        .tag-btn[data-id="key3"] { transform: translateX(-50%) rotate(0deg); z-index: 3; }
        .tag-btn[data-id="key4"] { transform: translateX(-50%) rotate(10deg); z-index: 2; }
        .tag-btn[data-id="key5"] { transform: translateX(-50%) rotate(20deg); z-index: 1; }

        /* EXPLOSION ON HOVER */
        .keychain-wrapper:hover .tag-btn[data-id="key1"] { transform: translateX(-220%) rotate(-50deg); }
        .keychain-wrapper:hover .tag-btn[data-id="key2"] { transform: translateX(-130%) rotate(-25deg); }
        .keychain-wrapper:hover .tag-btn[data-id="key3"] { transform: translateX(-50%) translateY(40px); }
        .keychain-wrapper:hover .tag-btn[data-id="key4"] { transform: translateX(30%) rotate(25deg); }
        .keychain-wrapper:hover .tag-btn[data-id="key5"] { transform: translateX(120%) rotate(50deg); }

        .tag-btn:hover {
            z-index: 100 !important;
            scale: 1.4;
            filter: brightness(1.2);
        }

        section.content { padding: 100px 50px; border-top: 1px solid #222; min-height: 100vh; }
        h2 { color: var(--accent); font-size: 1.5rem; letter-spacing: 3px; }

        #adminPanel {
            display: none; position: fixed; top: 0; right: 0;
            width: 350px; height: 100%; background: #111;
            border-left: 2px solid var(--accent); z-index: 2000; padding: 40px;
        }
        .admin-open { display: block !important; }
        input { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 10px; margin: 10px 0; font-family: var(--mono); }
    </style>
</head>
<body>

    <header>
        <div class="brand">WELCOME TO CAPUCINE'S PORTFOLIO</div>
        <nav>
            <a href="#about">ABOUT</a>
            <a href="mailto:hello@capucine.com">CONTACT</a>
            <button class="admin-trigger" onclick="openAdmin()">SETTINGS</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <p class="eyebrow">CREATIVE PORTFOLIO</p>
            <h1>capucine's portfolio</h1>
            
            <div class="keychain-wrapper">
                <img src="assets/support.png" class="support-img" alt="Support">
                
                <button class="tag-btn" data-id="key1" onclick="scrollToSec('product')">
                    <img src="assets/key1.png" alt="Product">
                </button>
                <button class="tag-btn" data-id="key2" onclick="scrollToSec('graphic')">
                    <img src="assets/key2.png" alt="Graphic">
                </button>
                <button class="tag-btn" data-id="key3" onclick="scrollToSec('industrial')">
                    <img src="assets/key3.png" alt="Industrial">
                </button>
                <button class="tag-btn" data-id="key4" onclick="scrollToSec('craft')">
                    <img src="assets/key4.png" alt="Craft">
                </button>
                <button class="tag-btn" data-id="key5" onclick="scrollToSec('about')">
                    <img src="assets/key5.png" alt="About">
                </button>
            </div>
        </section>

        <section id="product" class="content"><h2>PRODUCT DESIGN</h2></section>
        <section id="graphic" class="content"><h2>GRAPHIC DESIGN</h2></section>
        <section id="industrial" class="content"><h2>INDUSTRIAL DESIGN</h2></section>
        <section id="craft" class="content"><h2>CRAFT & DESIGN</h2></section>
        <section id="about" class="content"><h2>ABOUT</h2></section>
    </main>

    <div id="adminPanel">
        <h3 style="color: var(--accent);">SETTINGS</h3>
        <input type="password" id="adminPass" placeholder="Password">
        <button onclick="checkAdmin()" style="width: 100%; padding: 10px; background: var(--accent); border: none; cursor: pointer;">UNLOCK</button>
        <button onclick="closeAdmin()" style="color: grey; background: none; border: none; margin-top: 20px; cursor: pointer;">CLOSE</button>
    </div>

    <script>
        function scrollToSec(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }
        function openAdmin() { document.getElementById('adminPanel').classList.add('admin-open'); }
        function closeAdmin() { document.getElementById('adminPanel').classList.remove('admin-open'); }
        function checkAdmin() {
            if(document.getElementById('adminPass').value === "NUGGETS4LIFE") {
                alert("Access Granted.");
            } else { alert("Wrong password."); }
        }
        // Preload from assets
        ['support.png', 'key1.png', 'key2.png', 'key3.png', 'key4.png', 'key5.png'].forEach(f => {
            new Image().src = 'assets/' + f;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Porte-Clés</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        .keychain-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; z-index: 100; pointer-events: none; }
        .keychain-wrapper { position: relative; width: 500px; height: 500px; pointer-events: auto; }
        .key-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 50% 21%; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none; }
        .hitbox { position: absolute; top: 25%; left: 35%; width: 30%; height: 50%; pointer-events: auto; cursor: pointer; z-index: 10; }
        .visual { width: 100%; height: 100%; transition: all 0.4s ease; filter: brightness(0.6); }
        .visual img { width: 100%; height: 100%; object-fit: contain; }
        .key-layer.is-active .visual { filter: brightness(1.2); transform: translateY(15px) scale(1.05); }
        .support-layer { z-index: 5; }
        nav { position: fixed; top: 40px; width: 100%; text-align: center; z-index: 1000; display: flex; justify-content: center; gap: 40px; }
        nav a { color: #fff; text-decoration: none; font-size: 11px; letter-spacing: 3px; opacity: 0.7; }
        .content-scroll { height: 200vh; }
    </style>
</head>
<body>

    <nav>
        <a href="#">PROJETS</a>
        <a href="#">INFOS</a>
        <a href="#">CONTACT</a>
    </nav>

    <div class="keychain-container">
        <div class="keychain-wrapper" id="keychain">
            <div class="key-layer support-layer">
                <div class="visual">
                    <img src="https://raw.githubusercontent.com/Arshakir/Porte-cles/main/anneau.png" alt="Ring">
                </div>
            </div>
            </div>
    </div>

    <div class="content-scroll"></div>

    <script src="app.js"></script>
</body>
</html>

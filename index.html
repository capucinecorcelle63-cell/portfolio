<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capucine's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #f3d44d;
            --bg: #000000;
            --text: #ffffff;
            --mono: 'Space Mono', monospace;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            display: flex; justify-content: space-between;
            padding: 30px; position: fixed;
            width: 100%; box-sizing: border-box;
            z-index: 1000; background: linear-gradient(to bottom, black, transparent);
        }

        .brand { font-weight: bold; font-size: 0.9rem; }
        nav a, .admin-trigger {
            color: white; text-decoration: none;
            margin-left: 20px; font-size: 0.8rem;
            cursor: pointer; background: none; border: none; font-family: var(--mono);
        }
        nav a:hover, .admin-trigger:hover { color: var(--accent); }

        /* HERO & KEYCHAIN */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .eyebrow { color: var(--accent); font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 10px; }
        h1 { font-size: 2.5rem; font-weight: normal; margin-bottom: 40px; }

        /* KEYCHAIN SYSTEM WITH PNGs */
        .keychain-container {
            position: relative; 
            width: 400px; 
            height: 400px;
            display: flex; 
            justify-content: center;
        }

        .keychain-ring {
            width: 120px; 
            height: auto;
            position: absolute; 
            top: 0; 
            z-index: 20;
            pointer-events: none; /* L'image support ne bloque pas le survol */
        }

        .key-tag {
            position: absolute; 
            top: 45px; /* Aligné sur l'anneau du support.png */
            left: 50%;
            width: 100px; /* Taille ajustable selon tes PNG */
            transform-origin: center 15px; /* Rotation depuis le trou du tag */
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: none;
            border: none;
            padding: 0;
        }

        .key-tag img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Position repos (éventail fermé) */
        .tag1 { transform: translateX(-50%) rotate(-15deg); z-index: 5; }
        .tag2 { transform: translateX(-50%) rotate(-8deg); z-index: 4; }
        .tag3 { transform: translateX(-50%) rotate(0deg); z-index: 3; }
        .tag4 { transform: translateX(-50%) rotate(8deg); z-index: 2; }
        .tag5 { transform: translateX(-50%) rotate(15deg); z-index: 1; }

        /* HOVER EFFECT (Éclatement - Reprend la logique de ton code favori) */
        .keychain-container:hover .tag1 { transform: translateX(-160%) rotate(-35deg); }
        .keychain-container:hover .tag2 { transform: translateX(-100%) rotate(-18deg); }
        .keychain-container:hover .tag3 { transform: translateX(-50%) translateY(30px); }
        .keychain-container:hover .tag4 { transform: translateX(0%) rotate(18deg); }
        .keychain-container:hover .tag5 { transform: translateX(60%) rotate(35deg); }

        /* Zoom sur le tag précisément survolé */
        .key-tag:hover, .key-tag:focus { 
            z-index: 100 !important; 
            scale: 1.2;
            outline: none;
        }

        /* SECTIONS */
        section.content { padding: 100px 50px; border-top: 1px solid #111; min-height: 80vh; }
        h2 { color: var(--accent); border-left: 3px solid var(--accent); padding-left: 15px; }
        
        /* ADMIN PANEL */
        #adminPanel {
            display: none; position: fixed; top: 0; right: 0;
            width: 350px; height: 100%; background: #111;
            border-left: 2px solid var(--accent); z-index: 2000;
            padding: 40px; box-sizing: border-box;
        }
        .admin-open { display: block !important; }
        input, textarea {
            width: 100%; background: #000; border: 1px solid #333;
            color: white; padding: 10px; margin: 10px 0; font-family: var(--mono);
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">WELCOME TO CAPUCINE'S PORTFOLIO</div>
        <nav>
            <a href="#about">ABOUT</a>
            <a href="mailto:hello@capucine.com">CONTACT</a>
            <button class="admin-trigger" onclick="openAdmin()">SETTINGS</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <p class="eyebrow">CREATIVE PORTFOLIO</p>
            <h1>capucine's portfolio</h1>
            
            <div class="keychain-container">
                <img src="assets/support.png" class="keychain-ring" alt="Ring Support">
                
                <button class="key-tag tag1" onclick="scrollToSec('product')">
                    <img src="assets/key1.png" alt="Product Design">
                </button>
                <button class="key-tag tag2" onclick="scrollToSec('graphic')">
                    <img src="assets/key2.png" alt="Graphic Design">
                </button>
                <button class="key-tag tag3" onclick="scrollToSec('industrial')">
                    <img src="assets/key3.png" alt="Industrial Design">
                </button>
                <button class="key-tag tag4" onclick="scrollToSec('craft')">
                    <img src="assets/key4.png" alt="Craft & Design">
                </button>
                <button class="key-tag tag5" onclick="scrollToSec('about')">
                    <img src="assets/key5.png" alt="About Me">
                </button>
            </div>
        </section>

        <section id="product" class="content"><h2>PRODUCT DESIGN</h2><div class="grid"></div></section>
        <section id="graphic" class="content"><h2>GRAPHIC DESIGN</h2><div class="grid"></div></section>
        <section id="industrial" class="content"><h2>INDUSTRIAL DESIGN</h2><div class="grid"></div></section>
        <section id="craft" class="content"><h2>CRAFT & DESIGN</h2><div class="grid"></div></section>
        <section id="about" class="content"><h2>ABOUT</h2><p>Designer based in Lyon.</p></section>
    </main>

    <div id="adminPanel">
        <h3 style="color: var(--accent);">SETTINGS</h3>
        <input type="password" id="adminPass" placeholder="Password">
        <button onclick="checkAdmin()" style="width: 100%; padding: 10px; background: var(--accent); border: none; cursor: pointer;">UNLOCK</button>
        <div id="adminTools" style="display:none; margin-top: 30px;">
            <input type="text" placeholder="Project Title">
            <textarea placeholder="Description"></textarea>
            <button style="background: white; color: black; border: none; padding: 5px 10px;">PUBLISH</button>
        </div>
        <br><br>
        <button onclick="closeAdmin()" style="color: grey; background: none; border: none; cursor: pointer;">CLOSE</button>
    </div>

    <script>
        // Prechargement des assets
        const assets = ['support.png', 'key1.png', 'key2.png', 'key3.png', 'key4.png', 'key5.png'];
        assets.forEach(file => { const img = new Image(); img.src = 'assets/' + file; });

        function scrollToSec(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        function openAdmin() { document.getElementById('adminPanel').classList.add('admin-open'); }
        function closeAdmin() { document.getElementById('adminPanel').classList.remove('admin-open'); }

        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "NUGGETS4LIFE") {
                document.getElementById('adminTools').style.display = 'block';
                alert("Access Granted. Welcome Capucine.");
            } else {
                alert("Wrong password.");
            }
        }
    </script>
</body>
</html>

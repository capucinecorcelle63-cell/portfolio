<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Design - Capucine</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #f3d44d; --bg: #000; --text: #fff; --mono: 'Space Mono', monospace; }
        body { background: var(--bg); color: var(--text); font-family: var(--mono); margin: 0; overflow-x: hidden; }

        header { padding: 30px; display: flex; justify-content: space-between; align-items: center; }
        .back-link { color: var(--text); text-decoration: none; font-size: 0.8rem; }
        .back-link:hover { color: var(--accent); }

        /* GALLERY HORIZONTALE */
        .gallery-container {
            display: flex;
            height: 70vh;
            padding: 20px;
            gap: 15px;
            overflow-x: auto;
            align-items: center;
        }

        .project-card {
            min-width: 300px;
            height: 100%;
            background: #111;
            border: 1px solid #333;
            position: relative;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            flex-shrink: 0;
        }

        /* Quand on clique (classe ajoutée en JS) */
        .project-card.expanded {
            min-width: 80vw;
            cursor: zoom-out;
        }

        .project-img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: 0.5s;
        }
        .project-card:hover .project-img, .project-card.expanded .project-img {
            filter: grayscale(0%);
        }

        .project-info {
            position: absolute; bottom: 20px; left: 20px;
            transition: 0.3s;
        }
        .project-title { font-size: 1.2rem; margin: 0; }
        .project-theme { color: var(--accent); font-size: 0.7rem; text-transform: uppercase; }

        /* Contenu caché qui s'affiche à l'agrandissement */
        .project-full-content {
            display: none;
            padding: 40px;
            background: rgba(0,0,0,0.8);
            color: white;
        }
        .expanded .project-full-content { display: block; }

        /* BOUTON AJOUT (Visible si admin) */
        #addProjectBtn {
            display: none; /* Caché par défaut */
            margin: 20px 50px;
            padding: 15px;
            border: 2px dashed var(--accent);
            color: var(--accent);
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-link">← BACK TO KEYS</a>
        <h2 style="margin: 0; font-size: 1rem;">PRODUCT DESIGN ARCHIVE</h2>
    </header>

    <div id="addProjectBtn" onclick="openAdminModal()">+ ADD NEW PROJECT TO THIS CATEGORY</div>

    <div class="gallery-container" id="gallery">
        <div class="project-card" onclick="toggleProject(this)">
            <img src="https://via.placeholder.com/800x1200" class="project-img">
            <div class="project-info">
                <p class="project-theme">Material Research</p>
                <h3 class="project-title">PROJECT ALPHA</h3>
            </div>
            <div class="project-full-content">
                <p>Description détaillée du projet, processus de création, etc.</p>
            </div>
        </div>
    </div>

    <script>
        // Fonction pour agrandir/réduire
        function toggleProject(card) {
            // Si une autre carte est déjà agrandie, on la ferme
            document.querySelectorAll('.project-card').forEach(c => {
                if(c !== card) c.classList.remove('expanded');
            });
            // On bascule l'état de la carte cliquée
            card.classList.toggle('expanded');
        }

        // Simuler la vérification de connexion (à lier avec ton mot de passe)
        window.onload = function() {
            if(localStorage.getItem('isAdmin') === 'true') {
                document.getElementById('addProjectBtn').style.display = 'block';
            }
        }
    </script>
</body>
</html>

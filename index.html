<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capucine's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <div class="brand">WELCOME TO CAPUCINE'S PORTFOLIO</div>
        <nav>
            <a href="#about">ABOUT</a>
            <a href="mailto:hello@capucine.com">CONTACT</a>
            <button class="admin-trigger" onclick="openAdmin()">SETTINGS</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <p class="eyebrow">CREATIVE PORTFOLIO</p>
            <h1>capucine's portfolio</h1>
            
            <div class="keychain-container">
                <img src="support.png" class="keychain-support" alt="Trousseau">

                <div class="key-tag tag1" onclick="scrollToSec('about')">
                    <img src="key1.png" alt="About Me">
                </div>
                <div class="key-tag tag2" onclick="scrollToSec('industrial')">
                    <img src="key2.png" alt="Industrial Design">
                </div>
                <div class="key-tag tag3" onclick="scrollToSec('product')">
                    <img src="key3.png" alt="Product Design">
                </div>
                <div class="key-tag tag4" onclick="scrollToSec('graphic')">
                    <img src="key4.png" alt="Graphic Design">
                </div>
                <div class="key-tag tag5" onclick="scrollToSec('craft')">
                    <img src="key5.png" alt="Craft & Design">
                </div>
            </div>
        </section>

        <section id="product" class="content-sec"><h2>PRODUCT DESIGN</h2><div class="grid"></div></section>
        <section id="graphic" class="content-sec"><h2>GRAPHIC DESIGN</h2><div class="grid"></div></section>
        <section id="industrial" class="content-sec"><h2>INDUSTRIAL DESIGN</h2><div class="grid"></div></section>
        <section id="craft" class="content-sec"><h2>CRAFT & DESIGN</h2><div class="grid"></div></section>
        <section id="about" class="content-sec">
            <h2>ABOUT</h2>
            <p>Designer based in Lyon. Exploring the boundary between physical objects and digital archives.</p>
        </section>
    </main>

    <div id="adminPanel">
        <h3 style="color: #f3d44d;">SETTINGS</h3>
        <input type="password" id="adminPass" placeholder="Password">
        <button onclick="checkAdmin()" style="width: 100%; padding: 10px; background: #f3d44d; border: none; cursor: pointer;">UNLOCK</button>
        <br><br>
        <button onclick="closeAdmin()" style="color: grey; background: none; border: none; cursor: pointer;">CLOSE</button>
    </div>

    <script>
        function scrollToSec(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        function openAdmin() { document.getElementById('adminPanel').classList.add('admin-open'); }
        function closeAdmin() { document.getElementById('adminPanel').classList.remove('admin-open'); }

        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "NUGGETS4LIFE") { alert("Access Granted."); } else { alert("Wrong password."); }
        }

        // Animation de balancement au chargement
        window.addEventListener('DOMContentLoaded', () => {
            const tags = document.querySelectorAll('.key-tag');
            tags.forEach((tag, index) => {
                tag.animate([
                    { transform: 'translateX(-50%) rotate(0deg)' },
                    { transform: 'translateX(-50%) rotate(10deg)' },
                    { transform: 'translateX(-50%) rotate(-5deg)' },
                    { transform: 'translateX(-50%) rotate(0deg)' }
                ], { duration: 1200, delay: index * 100, easing: 'ease-in-out' });
            });
        });
    </script>
</body>
</html>
